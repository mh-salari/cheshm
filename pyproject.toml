    "TRY003",
    "EM101",
    "EM102",
    "D401",
    "PLR0911",
    "C901",
    "PLR0912",
    "PLR0913",
    "PLR0917",
    "PLR0914",
    "N803",
    "N806",
]

# Greek letters + typographic minus that appear in paper-faithful docstrings
# (σ in Gaussian-kernel sizing, α for ellipse rotation, θ angles, − minus in math).
lint.allowed-confusables = ["σ", "α", "−", "θ"]

[tool.ruff.lint.per-file-ignores]
# C-compilation orchestration: argv is hardcoded literal strings, not user input.
"hatch_build.py" = ["S404", "S603"]
"scripts/build_c.py" = ["S404", "S603", "INP001"]
