[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[project]
name = "lavan"
dynamic = ["version"]
description = "Eye-image primitives: pupil + glint + limbus detection, Daugman boundary detectors, and iris-texture image alignment."
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
authors = [
    {name = "Mohammadhossein Salari", email = "mohammadhossein.salari@gmail.com"},
]
keywords = [
    "eye-tracking",
    "iris-detection",
    "pupil-detection",
    "glint-detection",
    "limbus-detection",
    "daugman",
    "image-alignment",
    "image-processing",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Operating System :: MacOS",
    "Operating System :: POSIX :: Linux",
    "Operating System :: Microsoft :: Windows",
    "Programming Language :: C",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Image Processing",
]
dependencies = [
    "matplotlib",
    "numba",
    "numpy",
    "opencv-python",
    "scipy",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.13.0",
    "pytest",
]

[project.scripts]
lavan-detect = "lavan.detect.cli:main"

[project.urls]
Homepage = "https://github.com/mh-salari/lavan"
Repository = "https://github.com/mh-salari/lavan"
Issues = "https://github.com/mh-salari/lavan/issues"

[tool.hatch.version]
source = "vcs"

[tool.hatch.build.targets.wheel]
packages = ["src/lavan"]

# Custom build hook compiles the 3 C kernels for the current OS and bundles
# the resulting .dylib / .so / .dll into the wheel. See hatch_build.py.
[tool.hatch.build.targets.wheel.hooks.custom]
path = "hatch_build.py"

[tool.hatch.build.targets.sdist]
include = [
    "src/lavan",
    "scripts",
    "hatch_build.py",
    "README.md",
]

[tool.ruff]
line-length = 119
preview = true

lint.extend-select = [
