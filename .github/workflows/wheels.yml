name: Build wheels

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  check_stubs:
    name: Check binding stubs are up to date
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: sudo apt-get update && sudo apt-get install -y libopencv-dev libeigen3-dev
      - run: pip install uv
      - run: ./scripts/regen_stubs.sh
      - name: Fail if stubs drifted
        run: |
          if ! git diff --exit-code -- '**/*.pyi'; then
            echo '::error::Stubs are stale. Run scripts/regen_stubs.sh locally and commit the updated .pyi files.'
            exit 1
          fi

  build_wheels:
    name: ${{ matrix.os }} ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            arch: arm64
          - os: macos-15-intel
            arch: x86_64
          - os: ubuntu-22.04
            arch: x86_64
          - os: windows-2022
            arch: AMD64
    steps:
      - uses: actions/checkout@v4
        with:
          # setuptools_scm reads the package version from VCS tags; the
          # default shallow clone hides them. fetch-depth: 0 pulls every
          # tag so the wheel ends up with the right version string
          # instead of a 0.0.0.devN placeholder.
          fetch-depth: 0

      # OpenCV and Eigen3 are not in any cibuildwheel image by default.
      # macOS and Windows install on the host (where cibuildwheel runs);
      # Linux runs scripts/manylinux-before-all.sh inside the container.
      - name: Install OpenCV + Eigen3 (macOS)
        if: runner.os == 'macOS'
        run: brew install opencv eigen

      - name: Install OpenCV (Windows)
        if: runner.os == 'Windows'
        run: choco install opencv -y --version 4.10.0

      - name: Install Eigen3 (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          curl -L https://gitlab.com/libeigen/eigen/-/archive/3.4.0/eigen-3.4.0.tar.gz | tar -xz
          cd eigen-3.4.0
          cmake -S . -B build -DBUILD_TESTING=OFF -DCMAKE_INSTALL_PREFIX=/c/eigen
          cmake --install build

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4
        env:
          CIBW_ARCHS: ${{ matrix.arch }}
          CIBW_BEFORE_ALL_LINUX: bash {project}/scripts/manylinux-before-all.sh
          CIBW_ENVIRONMENT_WINDOWS: 'OpenCV_DIR=C:\\tools\\opencv\\build CMAKE_PREFIX_PATH=C:\\eigen'

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.arch }}
          path: wheelhouse/*.whl

  build_sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install build
      - run: python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # Publish to PyPI only when a GitHub Release is published. Tag pushes
  # alone do not publish — they only build wheels for verification.
  publish_pypi:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    if: github.event_name == 'release' && github.event.action == 'published'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
